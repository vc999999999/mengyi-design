<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="800" height="500" fill="#ECE0C4"/>
  <!-- 刊头条 -->
  <rect x="0" y="0" width="800" height="92" fill="#100E0C"/>
  <text x="28" y="38" fill="#7a6f59" font-size="15" letter-spacing="2">电子梦呓 / DIGITAL REVERIE</text>
  <text x="772" y="38" fill="#7a6f59" font-size="14" text-anchor="end">NO.012 · 科普</text>
  <text x="28" y="76" fill="#ECE0C4" font-size="34" font-weight="900">可爱<tspan fill="#F5C20B">机</tspan><tspan fill="#E8356F">械</tspan>·丝网</text>

  <!-- 插画框 + 可爱机械主角 -->
  <rect x="430" y="118" width="346" height="240" fill="#100E0C" stroke="#100E0C" stroke-width="3"/>
  <g opacity="0.35" stroke="#1f1b16"><path d="M430 178H776M430 238H776M430 298H776M490 118V358M560 118V358M630 118V358M700 118V358"/></g>
  <!-- 天线+爱心 -->
  <line x1="560" y1="150" x2="548" y2="128" stroke="#ECE0C4" stroke-width="5"/>
  <path d="M540 120 a6 6 0 0 1 11 0 a6 6 0 0 1 11 0 q0 8 -11 15 q-11 -7 -11 -15z" fill="#E8356F" stroke="#100E0C" stroke-width="2"/>
  <!-- 身体 -->
  <rect x="500" y="156" width="150" height="140" rx="68" fill="#F5C20B" stroke="#100E0C" stroke-width="5"/>
  <ellipse cx="544" cy="216" rx="26" ry="29" fill="#ECE0C4" stroke="#100E0C" stroke-width="4"/>
  <ellipse cx="606" cy="216" rx="26" ry="29" fill="#ECE0C4" stroke="#100E0C" stroke-width="4"/>
  <circle cx="550" cy="221" r="11" fill="#100E0C"/><circle cx="612" cy="221" r="11" fill="#100E0C"/>
  <circle cx="512" cy="250" r="9" fill="#E8356F" opacity="0.8"/><circle cx="638" cy="250" r="9" fill="#E8356F" opacity="0.8"/>
  <path d="M548 258 Q575 276 602 258" fill="none" stroke="#100E0C" stroke-width="5" stroke-linecap="round"/>
  <!-- 足球 -->
  <circle cx="712" cy="300" r="42" fill="#ECE0C4" stroke="#100E0C" stroke-width="5"/>
  <polygon points="712,278 729,291 722,311 702,311 695,291" fill="#100E0C"/>

  <!-- 左侧卡片 -->
  <rect x="28" y="120" width="372" height="78" fill="#1B46D4" stroke="#100E0C" stroke-width="3"/>
  <text x="46" y="152" fill="#F5C20B" font-size="13">LAYER 1 · 插画</text>
  <text x="46" y="180" fill="#ECE0C4" font-size="20" font-weight="900">可爱机械吉祥物</text>
  <rect x="28" y="212" width="372" height="78" fill="#fff" stroke="#100E0C" stroke-width="3"/>
  <text x="46" y="244" fill="#7a6f59" font-size="13">LAYER 2 · 套版</text>
  <text x="46" y="272" fill="#100E0C" font-size="20" font-weight="900">刊头 · 色标 · 网点</text>

  <!-- 色板 -->
  <text x="28" y="338" fill="#100E0C" font-size="14" font-weight="700">固定色板(可换预设)</text>
  <g stroke="#100E0C" stroke-width="2">
    <rect x="28" y="350" width="56" height="40" fill="#100E0C"/><rect x="92" y="350" width="56" height="40" fill="#ECE0C4"/>
    <rect x="156" y="350" width="56" height="40" fill="#1B46D4"/><rect x="220" y="350" width="56" height="40" fill="#F5C20B"/>
    <rect x="284" y="350" width="56" height="40" fill="#E5341D"/><rect x="348" y="350" width="56" height="40" fill="#E8356F"/>
  </g>
  <!-- 金句条 -->
  <rect x="28" y="412" width="744" height="60" fill="#E8356F" stroke="#100E0C" stroke-width="3"/>
  <text x="48" y="450" fill="#ECE0C4" font-size="22" font-weight="900">复古丝网 × 高饱和 × 可爱机械拟人</text>
