<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="800" height="500" fill="#D6D2E1"/>

  <!-- 标题 + 手绘圈 -->
  <text x="40" y="58" fill="#111111" font-size="38" font-weight="800">用数据 掌控 趋势</text>
  <path d="M162 30 C155 13 262 12 268 33 C272 53 176 59 156 37" fill="none" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  <text x="40" y="90" fill="#111" opacity="0.7" font-size="15">极简扁平 · 粗黑手绘线 · 几何图表 + 手部动作</text>

  <!-- 左栏:主插画卡(折线 + 手,全部收在卡内) -->
  <g transform="rotate(-0.5 280 270)">
    <rect x="44" y="120" width="472" height="300" rx="22" fill="#F3EFE4" stroke="#111" stroke-width="3"/>
  </g>
  <g fill="none" stroke="#111" stroke-linecap="round" stroke-linejoin="round">
    <path d="M92 162 V398 H476" stroke-width="4"/>
    <g stroke-width="2" opacity="0.28"><path d="M92 344 H476"/><path d="M92 288 H476"/><path d="M92 232 H476"/></g>
    <path d="M118 376 L186 348 L252 300 L320 322 L388 244 L452 192" stroke-width="5"/>
    <path d="M452 192 L494 160" stroke-width="4"/><path d="M474 160 L496 156 L494 180" stroke-width="4"/>
  </g>
  <g stroke="#111" stroke-width="3.4">
    <circle cx="186" cy="348" r="7" fill="#F3EFE4"/><circle cx="252" cy="300" r="7" fill="#F3EFE4"/>
    <circle cx="320" cy="322" r="7" fill="#F3EFE4"/><circle cx="388" cy="244" r="7" fill="#F3EFE4"/>
    <circle cx="452" cy="192" r="9" fill="#F3EFE4"/>
  </g>
  <!-- 简笔手:收在卡内右下,食指朝上指向折线高点 -->
  <g stroke="#111" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <rect x="372" y="372" width="74" height="40" rx="11" fill="#F3EFE4"/>
    <rect x="366" y="318" width="86" height="62" rx="26" fill="#F3EFE4"/>
    <path d="M368 346 q-22 -2 -28 12" fill="#F3EFE4"/>
    <g transform="translate(406,326) rotate(-26)"><rect x="-11" y="-126" width="22" height="132" rx="11" fill="#F3EFE4"/></g>
  </g>

  <!-- 右栏:三步卡片(与左栏不交叠) -->
  <g>
    <g transform="rotate(0.6 656 166)"><rect x="540" y="120" width="232" height="92" rx="14" fill="#F3EFE4" stroke="#111" stroke-width="3"/></g>
    <circle cx="564" cy="120" r="11" fill="#F3EFE4" stroke="#111" stroke-width="3"/>
    <text x="562" y="160" fill="#111" font-size="19" font-weight="800">01 看懂折线</text>
    <text x="562" y="186" fill="#111" opacity="0.8" font-size="13">找拐点与异常点</text>

    <g transform="rotate(-0.6 656 270)"><rect x="540" y="224" width="232" height="92" rx="14" fill="#F3EFE4" stroke="#111" stroke-width="3"/></g>
    <circle cx="564" cy="224" r="11" fill="#F3EFE4" stroke="#111" stroke-width="3"/>
    <text x="562" y="264" fill="#111" font-size="19" font-weight="800">02 按住节点</text>
    <text x="562" y="290" fill="#111" opacity="0.8" font-size="13">一次只推一个杠杆</text>

    <g transform="rotate(0.6 656 374)"><rect x="540" y="328" width="232" height="92" rx="14" fill="#F3EFE4" stroke="#111" stroke-width="3"/></g>
    <circle cx="564" cy="328" r="11" fill="#F3EFE4" stroke="#111" stroke-width="3"/>
    <text x="562" y="368" fill="#111" font-size="19" font-weight="800">03 往上拉</text>
    <text x="562" y="394" fill="#111" opacity="0.8" font-size="13">小步调整看反馈</text>
  </g>

  <!-- 色板 -->
  <g stroke="#111" stroke-width="2">
    <rect x="44" y="446" width="44" height="30" fill="#D6D2E1"/><rect x="96" y="446" width="44" height="30" fill="#111111"/><rect x="148" y="446" width="44" height="30" fill="#F3EFE4"/>
  </g>
  <text x="206" y="467" fill="#111" opacity="0.7" font-size="14">三色克制 · 配色可换预设</text>
</svg>
