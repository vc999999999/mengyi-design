<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Archivo,-apple-system,Segoe UI,Roboto,sans-serif">
  <rect width="800" height="500" fill="#F3F1EB"/>

  <!-- 眉标条 -->
  <text x="44" y="40" font-size="12" font-weight="700" letter-spacing="3" fill="#111">DEEP DIVE / 深度解读</text>
  <text x="756" y="40" font-size="12" font-weight="700" letter-spacing="3" fill="#111" opacity="0.6" text-anchor="end">ISSUE 01 · 2026</text>
  <line x1="44" y1="52" x2="756" y2="52" stroke="#111" stroke-width="2"/>

  <!-- 左:超大标题 + 编号 -->
  <text x="42" y="120" font-size="46" font-weight="900" fill="#111">不是模板,</text>
  <text x="42" y="170" font-size="46" font-weight="900" fill="#111">是一台</text>
  <text x="42" y="220" font-size="46" font-weight="900" fill="#E2231A">技能工厂</text>
  <line x1="44" y1="250" x2="430" y2="250" stroke="#111" stroke-width="2"/>

  <g font-family="Archivo,sans-serif">
    <text x="44" y="300" font-size="34" font-weight="900" fill="#E2231A">01</text>
    <text x="104" y="296" font-size="17" font-weight="700" fill="#111">Baseline 对照</text>
    <text x="104" y="318" font-size="12.5" fill="#111" opacity="0.6">有/无 skill 两组对跑</text>
    <line x1="44" y1="334" x2="430" y2="334" stroke="#111" stroke-width="1.5"/>
    <text x="44" y="376" font-size="34" font-weight="900" fill="#111">02</text>
    <text x="104" y="372" font-size="17" font-weight="700" fill="#111">人类审阅</text>
    <text x="104" y="394" font-size="12.5" fill="#111" opacity="0.6">把判断做成流程节点</text>
    <line x1="44" y1="410" x2="430" y2="410" stroke="#111" stroke-width="1.5"/>
    <text x="44" y="452" font-size="34" font-weight="900" fill="#111">03</text>
    <text x="104" y="448" font-size="17" font-weight="700" fill="#111">触发优化</text>
    <text x="104" y="470" font-size="12.5" fill="#111" opacity="0.6">该不该触发也可测</text>
  </g>

  <!-- 右:几何构成 -->
  <line x1="470" y1="70" x2="470" y2="448" stroke="#111" stroke-width="2"/>
  <circle cx="600" cy="180" r="92" fill="#E2231A"/>
  <rect x="560" y="240" width="170" height="170" fill="#111"/>
  <rect x="630" y="150" width="64" height="64" fill="#F3F1EB"/>
  <line x1="490" y1="300" x2="740" y2="300" stroke="#111" stroke-width="2"/>
  <text x="490" y="440" font-size="11" font-weight="700" letter-spacing="2" fill="#111" opacity="0.6">FIG.01 — INPUT → TEST → IMPROVE</text>

  <!-- 页脚 -->
  <line x1="44" y1="476" x2="756" y2="476" stroke="#111" stroke-width="2"/>
  <text x="44" y="494" font-size="11" font-weight="700" letter-spacing="2" fill="#111" opacity="0.6">MENGYI DESIGN · 编辑风</text>
  <text x="756" y="494" font-size="11" font-weight="700" letter-spacing="2" fill="#111" opacity="0.6" text-anchor="end">P. 01</text>
</svg>
